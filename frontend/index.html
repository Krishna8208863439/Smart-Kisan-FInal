<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Primary Meta -->
    <title>Smart Kisan — AI Digital Agriculture Platform</title>
    <meta name="description" content="Smart Kisan is an AI-powered farming companion for Indian farmers. Get crop disease detection, AI chatbot advice, weather forecasts, mandi prices, and more." />
    <meta name="keywords" content="smart kisan, farming app, crop disease, AI agriculture, kisan, mandi prices, weather farm" />
    <meta name="author" content="Smart Kisan Team" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#15803d" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SmartKisan" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Smart Kisan — AI Digital Agriculture Platform" />
    <meta property="og:description" content="AI-powered farming companion for crop management, disease detection, and market prices." />
    <meta property="og:image" content="/icon-512.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
            .catch(err => console.warn('[PWA] SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
