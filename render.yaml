services:
  - type: web
    name: smart-kisan-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        placeholder: "mongodb+srv://..."
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        placeholder: "Your Google OAuth Client ID"
